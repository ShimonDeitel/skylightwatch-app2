name: Skylightwatch
options:
  bundleIdPrefix: com.shimondeitel.skylightwatch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Skylightwatch:
    type: application
    platform: iOS
    sources:
      - path: Skylightwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.skylightwatch
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Skylightwatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SkylightwatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SkylightwatchTests
      - path: Skylightwatch.storekit
    dependencies:
      - target: Skylightwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.skylightwatch.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SkylightwatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SkylightwatchUITests
    dependencies:
      - target: Skylightwatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.skylightwatch.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Skylightwatch:
    build:
      targets:
        Skylightwatch: all
        SkylightwatchTests: [test]
        SkylightwatchUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Skylightwatch.storekit
    test:
      config: Debug
      storeKitConfiguration: Skylightwatch.storekit
      targets:
        - SkylightwatchTests
        - SkylightwatchUITests
    archive:
      config: Release
